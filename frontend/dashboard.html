<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mise — Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* admin-only hidden by default */
    .adm { display: none }
    .adm.show { display: block }
    .adm-flex { display: none }
    .adm-flex.show { display: flex }
  </style>
</head>
<body>

<div id="toasts"></div>

<!-- Assign Table Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">Seat guests</div>
    <div class="modal-sub">How many guests need a table?</div>
    <div class="stepper">
      <button class="step-btn" id="dec" type="button">−</button>
      <input class="step-in" type="number" id="guests" value="2" min="1" max="20"/>
      <button class="step-btn" id="inc" type="button">+</button>
    </div>
    <div class="m-btns">
      <button class="btn-outline" id="m-cancel">Cancel</button>
      <button class="btn-ok" id="m-ok">
        <span class="cta-text">Assign table</span>
        <span class="cta-spinner"></span>
      </button>
    </div>
  </div>
</div>

<!-- Sidebar mask -->
<div class="sb-mask" id="mask"></div>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-hd">
      <div class="sb-icon">🍽</div>
      <span class="sb-name">Mise</span>
      <span class="sb-tag">OS</span>
    </div>

    <nav class="sb-nav">
      <div class="sb-sec">Menu</div>
      <button class="sb-item on" data-sec="overview"><i class="fa-solid fa-gauge-high"></i>Overview</button>
      <button class="sb-item" data-sec="tables"><i class="fa-solid fa-utensils"></i>Tables<span class="sb-cnt" id="n-tables">—</span></button>
      <button class="sb-item" data-sec="queue"><i class="fa-solid fa-clock-rotate-left"></i>Queue<span class="sb-cnt" id="n-queue">—</span></button>
      <div class="adm" id="adm-nav">
        <div class="sb-sec">Admin</div>
        <button class="sb-item" data-sec="waiters"><i class="fa-solid fa-users"></i>Waiters</button>
      </div>
      <div style="flex:1"></div>
      <div class="sb-sec">Account</div>
      <button class="sb-item danger" id="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i>Sign out</button>
    </nav>

    <div class="sb-usr">
      <div class="sb-usr-inner">
        <div class="sb-av" id="sb-av">?</div>
        <div>
          <div class="sb-uname" id="sb-name">—</div>
          <div class="sb-urole" id="sb-role">—</div>
        </div>
        <div class="sb-online"></div>
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <div class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div class="tb-l">
        <button class="tb-icon mob-menu" id="mob-menu"><i class="fa-solid fa-bars"></i></button>
        <span class="tb-title" id="tb-title">Overview</span>
        <span class="tb-sep">/</span>
        <span class="tb-sub" id="tb-sub">Floor at a glance</span>
      </div>
      <div class="tb-r">
        <!-- WS -->
        <div class="ws-pill" id="ws-pill">
          <div class="ws-dot"></div>
          <span class="ws-lbl">Connecting</span>
        </div>
        <!-- Availability (waiter only) -->
        <label class="avail-wrap" id="avail-wrap">
          <label class="sw">
            <input type="checkbox" id="avail-chk"/>
            <div class="sw-track"></div>
            <div class="sw-thumb"></div>
          </label>
          <span class="avail-lbl" id="avail-lbl">Busy</span>
        </label>
      </div>
    </header>

    <!-- Pages -->
    <div class="page">

      <!-- ══ OVERVIEW ══ -->
      <section id="sec-overview">
        <!-- Stats -->
        <div class="stats-row" id="stats-row">
          <!-- skeleton -->
          <div class="skel-card"><div class="skel" style="height:11px;width:60%"></div><div class="skel" style="height:26px;width:40%;margin-top:6px"></div></div>
          <div class="skel-card"><div class="skel" style="height:11px;width:60%"></div><div class="skel" style="height:26px;width:40%;margin-top:6px"></div></div>
          <div class="skel-card"><div class="skel" style="height:11px;width:60%"></div><div class="skel" style="height:26px;width:40%;margin-top:6px"></div></div>
          <div class="skel-card"><div class="skel" style="height:11px;width:60%"></div><div class="skel" style="height:26px;width:40%;margin-top:6px"></div></div>
        </div>

        <div class="cgrid">
          <div class="col-l">
            <!-- Tables panel -->
            <div class="panel">
              <div class="panel-hd">
                <div class="panel-title"><i class="fa-solid fa-table-cells"></i>Floor plan</div>
                <div class="panel-acts">
                  <span class="p-count" id="ov-tcnt">—</span>
                  <button class="btn-refresh" id="ref-tables"><i class="fa-solid fa-arrows-rotate"></i>Refresh</button>
                </div>
              </div>
              <div class="panel-body">
                <div class="ftabs">
                  <button class="ft on" data-f="all">All</button>
                  <button class="ft" data-f="free">Available</button>
                  <button class="ft" data-f="occupied">Occupied</button>
                </div>
                <div class="tgrid" id="tgrid-ov">
                  <div class="skel-card"><div class="skel" style="height:18px;width:40%"></div><div class="skel" style="height:11px"></div></div>
                  <div class="skel-card"><div class="skel" style="height:18px;width:40%"></div><div class="skel" style="height:11px"></div></div>
                  <div class="skel-card"><div class="skel" style="height:18px;width:40%"></div><div class="skel" style="height:11px"></div></div>
                  <div class="skel-card"><div class="skel" style="height:18px;width:40%"></div><div class="skel" style="height:11px"></div></div>
                  <div class="skel-card"><div class="skel" style="height:18px;width:40%"></div><div class="skel" style="height:11px"></div></div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-r">
            <!-- Seat guests (admin) -->
            <div class="panel adm" id="adm-assign">
              <div class="panel-hd">
                <div class="panel-title"><i class="fa-solid fa-user-plus"></i>Seat guests</div>
                <button class="btn-accent" id="open-modal"><i class="fa-solid fa-plus"></i>Assign</button>
              </div>
            </div>

            <!-- Queue -->
            <div class="panel">
              <div class="panel-hd">
                <div class="panel-title"><i class="fa-solid fa-clock-rotate-left"></i>Queue</div>
                <span class="p-count" id="ov-qcnt">—</span>
              </div>
              <div class="panel-body">
                <div class="q-list" id="qlist-ov">
                  <div class="skel" style="height:38px;border-radius:var(--r1)"></div>
                  <div class="skel" style="height:38px;border-radius:var(--r1);margin-top:5px"></div>
                </div>
              </div>
            </div>

            <!-- Live feed -->
            <div class="panel">
              <div class="panel-hd">
                <div class="panel-title"><i class="fa-solid fa-satellite-dish"></i>Live</div>
                <button class="tb-icon" id="clear-feed" title="Clear"><i class="fa-solid fa-xmark"></i></button>
              </div>
              <div class="feed-body" id="feed-body">
                <div class="empty"><div class="empty-ico"><i class="fa-solid fa-satellite-dish"></i></div><p>Listening…</p></div>
              </div>
            </div>

          </div>
        </div>
      </section>

      <!-- ══ TABLES ══ -->
      <section id="sec-tables" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;">
          <div>
            <div style="font-size:17px;font-weight:600;color:var(--t1);letter-spacing:-.025em">Tables</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">All floor tables</div>
          </div>
          <button class="btn-refresh" id="ref-tables2"><i class="fa-solid fa-arrows-rotate"></i>Refresh</button>
        </div>
        <div class="ftabs" id="ftabs2">
          <button class="ft on" data-f="all">All</button>
          <button class="ft" data-f="free">Available</button>
          <button class="ft" data-f="occupied">Occupied</button>
        </div>
        <div class="tgrid" id="tgrid-t" style="margin-top:12px"></div>
      </section>

      <!-- ══ QUEUE ══ -->
      <section id="sec-queue" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;">
          <div>
            <div style="font-size:17px;font-weight:600;color:var(--t1);letter-spacing:-.025em">Queue</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">Waiting customers</div>
          </div>
          <button class="btn-refresh" id="ref-queue"><i class="fa-solid fa-arrows-rotate"></i>Refresh</button>
        </div>
        <div class="q-list" id="qlist-q"></div>
      </section>

      <!-- ══ WAITERS (admin) ══ -->
      <section id="sec-waiters" class="adm" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;">
          <div>
            <div style="font-size:17px;font-weight:600;color:var(--t1);letter-spacing:-.025em">Waiters</div>
            <div style="font-size:12px;color:var(--t4);margin-top:2px">Team overview</div>
          </div>
          <button class="btn-refresh" id="ref-waiters"><i class="fa-solid fa-arrows-rotate"></i>Refresh</button>
        </div>
        <div class="panel">
          <table class="dtable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>ID</th>
                <th>Status</th>
                <th style="text-align:right">Action</th>
              </tr>
            </thead>
            <tbody id="waiters-tb">
              <tr><td colspan="5" style="text-align:center;padding:28px;color:var(--t4)">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </div><!-- /page -->
  </div><!-- /main -->
</div><!-- /app -->

<script src="script.js"></script>
<script>
!function(){
  const { Auth, API, Toast, Btn, Guard, WS, initials, _esc } = Mise;
  if (!Guard.auth()) return;

  const role = Auth.role();
  const name = Auth.name();
  let tables = [], queue = [], filter = 'all';

  /* ── User info ── */
  function fillUser() {
    const disp = name || (role === 'admin' ? 'Admin' : 'Waiter');
    document.getElementById('sb-av').textContent   = initials(disp);
    document.getElementById('sb-name').textContent = disp;
    document.getElementById('sb-role').textContent = role === 'admin' ? 'Administrator' : 'Waiter';
  }
  fillUser();

  /* ── Admin reveal ── */
  if (role === 'admin') {
    document.querySelectorAll('.adm').forEach(el => el.classList.add('show'));
    document.getElementById('avail-wrap').style.display = 'none';
  }

  /* ── Sidebar mobile ── */
  const sidebar = document.getElementById('sidebar');
  const mask    = document.getElementById('mask');
  document.getElementById('mob-menu').addEventListener('click', () => {
    sidebar.classList.toggle('open');
    mask.classList.toggle('show');
  });
  mask.addEventListener('click', () => {
    sidebar.classList.remove('open');
    mask.classList.remove('show');
  });

  /* ── Section nav ── */
  const SEC = {
    overview: { title: 'Overview',  sub: 'Floor at a glance' },
    tables:   { title: 'Tables',    sub: 'All floor tables' },
    queue:    { title: 'Queue',      sub: 'Waiting customers' },
    waiters:  { title: 'Waiters',    sub: 'Team overview' },
  };

  function showSec(k) {
    document.querySelectorAll('.sb-item[data-sec]').forEach(b => b.classList.toggle('on', b.dataset.sec === k));
    ['overview','tables','queue','waiters'].forEach(s => {
      const el = document.getElementById(`sec-${s}`);
      if (el) el.style.display = s === k ? 'block' : 'none';
    });
    const cfg = SEC[k] || {};
    document.getElementById('tb-title').textContent = cfg.title || k;
    document.getElementById('tb-sub').textContent   = cfg.sub   || '';
    sidebar.classList.remove('open'); mask.classList.remove('show');
    if (k === 'tables')  renderTgrid('tgrid-t', tables);
    if (k === 'queue')   renderQlist('qlist-q', queue);
    if (k === 'waiters') loadWaiters();
  }

  document.querySelectorAll('.sb-item[data-sec]').forEach(b => {
    b.addEventListener('click', () => showSec(b.dataset.sec));
  });

  /* ── Stats ── */
  function renderStats() {
    const free     = tables.filter(t => t.status === 'free').length;
    const occupied = tables.filter(t => t.status === 'occupied').length;
    const defs = [
      { lbl: 'Total tables',     val: tables.length, ico: 'fa-table-cells',   meta: 'On the floor' },
      { lbl: 'Available',        val: free,           ico: 'fa-circle-check',  meta: 'Ready to seat', cls: free > 0 ? 'color:var(--green)' : '' },
      { lbl: 'Occupied',         val: occupied,       ico: 'fa-circle-dot',    meta: 'Currently serving', cls: occupied > 0 ? 'color:var(--red)' : '' },
      { lbl: 'In queue',         val: queue.length,   ico: 'fa-clock',         meta: 'Waiting', cls: queue.length > 0 ? 'color:var(--yellow)' : '' },
    ];
    document.getElementById('stats-row').innerHTML = defs.map(d => `
      <div class="stat-card">
        <div class="stat-lbl"><i class="fa-solid ${d.ico}" style="${d.cls||''}"></i>${_esc(d.lbl)}</div>
        <div class="stat-val" style="${d.cls||''}">${d.val}</div>
        <div class="stat-meta">${d.meta}</div>
      </div>
    `).join('');
  }

  /* ── Table card ── */
  function tcard(t) {
    const lbl = t.status === 'free' ? 'Free' : t.status.charAt(0).toUpperCase() + t.status.slice(1);
    return `<div class="tcard ${t.status}" style="cursor:pointer" onclick="if(window.Mise.cycleTable) window.Mise.cycleTable(${t.id}, '${t.status}')">
      <div class="tc-top">
        <div class="tc-num"><span class="tc-num-lbl">Table</span>${t.id}</div>
        <div class="t-badge ${t.status}"><div class="t-bd"></div>${lbl}</div>
      </div>
      <div class="tc-meta">
        <div class="tc-row"><i class="fa-solid fa-chair"></i>${t.capacity} seat${t.capacity!==1?'s':''}</div>
        ${t.waiter_id ? `<div class="tc-row" style="font-family:var(--mono);font-size:10px;"><i class="fa-solid fa-user-tie"></i>${_esc(t.waiter_id.slice(0,8))}…</div>` : ''}
      </div>
    </div>`;
  }


  function renderTgrid(id, data) {
    const el = document.getElementById(id);
    if (!el) return;
    const filtered = filter === 'all' ? data : data.filter(t => t.status === filter);
    if (!filtered.length) {
      el.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-ico"><i class="fa-solid fa-table-cells"></i></div><p>No tables match this filter</p></div>`;
    } else {
      el.innerHTML = filtered.map(tcard).join('');
    }
  }

  /* ── Queue list ── */
  function renderQlist(id, data) {
    const el = document.getElementById(id);
    if (!el) return;
    const cnt = document.getElementById('ov-qcnt');
    const ncnt = document.getElementById('n-queue');
    if (cnt) cnt.textContent = data.length || '0';
    if (ncnt) ncnt.textContent = data.length || '0';

    if (!data.length) {
      el.innerHTML = `<div class="empty"><div class="empty-ico"><i class="fa-solid fa-check-circle" style="color:var(--green)"></i></div><p>Queue is clear</p></div>`;
      return;
    }
    el.innerHTML = data.map((q, i) => `
      <div class="q-item">
        <span class="q-pos">${i+1}</span>
        <span class="q-sep"></span>
        <span class="q-guests">${q.customers} <span>guest${q.customers!==1?'s':''}</span></span>
        <span class="q-wait">~${(i+1)*15}m</span>
      </div>
    `).join('');
  }

  /* ── Load tables ── */
  async function loadTables() {
    try {
      const d = await API.tables();
      tables = (Array.isArray(d) ? d : []).sort((a,b) => a.id - b.id);
      const free = tables.filter(t => t.status === 'free').length;
      const tcnt = document.getElementById('ov-tcnt');
      const ncnt = document.getElementById('n-tables');
      if (tcnt) tcnt.textContent = `${free}/${tables.length} free`;
      if (ncnt) ncnt.textContent = tables.length;
      renderTgrid('tgrid-ov', tables);
      renderTgrid('tgrid-t', tables);
      renderStats();
    } catch(ex) { Toast.error('Failed to load tables'); }
  }

  /* ── Load queue ── */
  async function loadQueue() {
    try {
      const d = await API.queue();
      queue = Array.isArray(d) ? d : [];
      renderQlist('qlist-ov', queue);
      renderQlist('qlist-q', queue);
      renderStats();
    } catch(ex) { Toast.error('Failed to load queue'); }
  }

  /* ── Filter tabs ── */
  function setupFtabs(selector) {
    document.querySelectorAll(`${selector} .ft`).forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll(`${selector} .ft`).forEach(x => x.classList.remove('on'));
        b.classList.add('on');
        filter = b.dataset.f;
        renderTgrid('tgrid-ov', tables);
        renderTgrid('tgrid-t', tables);
      });
    });
  }
  setupFtabs('.ftabs');
  setupFtabs('#ftabs2');

  /* ── Availability toggle ── */
  const avChk = document.getElementById('avail-chk');
  const avLbl = document.getElementById('avail-lbl');
  const avWrap = document.getElementById('avail-wrap');
  let avTimer;
  avChk.addEventListener('change', () => {
    const on = avChk.checked;
    avLbl.textContent = on ? 'Available' : 'Busy';
    avWrap.className = `avail-wrap${on ? ' on' : ''}`;
    clearTimeout(avTimer);
    avTimer = setTimeout(async () => {
      try {
        await API.setAvail(on);
        Toast.success(on ? 'You are now available' : 'Marked as busy');
      } catch(ex) {
        Toast.error('Status update failed');
        avChk.checked = !on;
        avLbl.textContent = !on ? 'Available' : 'Busy';
        avWrap.className = `avail-wrap${!on ? ' on' : ''}`;
      }
    }, 280);
  });

  /* ── Logout ── */
  document.getElementById('logout-btn').addEventListener('click', async () => {
    try { await API.logout(); } catch(_){}
    Auth.clear();
    Toast.info('Signed out');
    setTimeout(() => location.href = 'index.html', 500);
  });

  /* ── Refresh buttons ── */
  function addRefresh(id, fn) {
    const b = document.getElementById(id);
    if (!b) return;
    b.addEventListener('click', async () => {
      b.classList.add('spin');
      await fn();
      setTimeout(() => b.classList.remove('spin'), 500);
    });
  }
  addRefresh('ref-tables',  loadTables);
  addRefresh('ref-tables2', loadTables);
  addRefresh('ref-queue',   loadQueue);
  addRefresh('ref-waiters', loadWaiters);

  /* ── Modal (assign) ── */
  const modal  = document.getElementById('modal');
  const mOk    = document.getElementById('m-ok');
  const gInput = document.getElementById('guests');

  document.getElementById('open-modal')?.addEventListener('click', () => modal.classList.add('on'));
  document.getElementById('m-cancel').addEventListener('click', () => modal.classList.remove('on'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('on'); });
  document.getElementById('dec').addEventListener('click', () => gInput.value = Math.max(1, +gInput.value - 1));
  document.getElementById('inc').addEventListener('click', () => gInput.value = Math.min(20, +gInput.value + 1));

  mOk.addEventListener('click', async () => {
    const customers = +gInput.value;
    if (!customers || customers < 1) { Toast.error('Enter guest count'); return; }
    Btn.load(mOk);
    try {
      const res = await API.assign({ customers });
      modal.classList.remove('on');
      Toast.success(res.table_id ? `Table ${res.table_id} assigned` : (res.message || 'Added to queue'));
      loadTables(); loadQueue();
    } catch(ex) {
      Toast.error(ex.message || 'Failed to assign');
    } finally { Btn.reset(mOk); }
  });

  /* ── Waiters (admin) ── */
  async function loadWaiters() {
    const tb = document.getElementById('waiters-tb');
    if (!tb) return;
    tb.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--t4)"><i class="fa-solid fa-spinner" style="animation:spin .7s linear infinite;margin-right:6px"></i>Loading</td></tr>`;
    try {
      const ws = await API.waiters();
      if (!ws || !ws.length) {
        tb.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--t4)">No waiters yet</td></tr>`;
        return;
      }
      tb.innerHTML = ws.map(w => `
        <tr>
          <td><div class="d-name"><div class="d-av">${initials(w.name)}</div>${_esc(w.name||'—')}</div></td>
          <td>${_esc(w.email||'—')}</td>
          <td><span class="d-mono">${_esc((w.emp_id||'').slice(0,8))}…</span></td>
          <td>
            <span class="av-badge ${w.available?'yes':'no'}">
              <span class="av-bd"></span>${w.available?'Available':'Busy'}
            </span>
          </td>
          <td style="text-align:right">
            <button class="btn-del" data-id="${_esc(w.emp_id)}"><i class="fa-solid fa-xmark"></i>Remove</button>
          </td>
        </tr>
      `).join('');
      tb.querySelectorAll('.btn-del').forEach(b => {
        b.addEventListener('click', async () => {
          if (!confirm('Remove this waiter?')) return;
          try { await API.delWaiter(b.dataset.id); Toast.success('Waiter removed'); loadWaiters(); }
          catch(ex) { Toast.error(ex.message || 'Failed'); }
        });
      });
    } catch(ex) {
      tb.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:28px;color:var(--red)">Failed to load</td></tr>`;
      Toast.error('Failed to load waiters');
    }
  }

  /* ── Clear feed ── */
  document.getElementById('clear-feed').addEventListener('click', () => {
    const fb = document.getElementById('feed-body');
    fb.innerHTML = `<div class="empty"><div class="empty-ico"><i class="fa-solid fa-satellite-dish"></i></div><p>Cleared</p></div>`;
  });

  /* ── WebSocket ── */
  WS.on(() => { loadTables(); loadQueue(); });
  WS.connect();

  /* ── Auto-refresh ── */
  setInterval(() => { loadTables(); loadQueue(); }, 30000);

  /* ── Cycle logic ── */
  Mise.cycleTable = async (id, currentStatus) => {
    let nextStatus = 'free';
    if (currentStatus === 'free') nextStatus = 'occupied';
    else if (currentStatus === 'occupied') nextStatus = 'billing';
    else if (currentStatus === 'billing') nextStatus = 'cleaning';
    
    // Optimistic UI update could go here, but reload via WS is fast enough
    try {
      await API.setTableStatus({ table_id: id, status: nextStatus });
    } catch(ex) {
      Toast.error('Failed to change table status');
    }
  };

  /* ── Init ── */
  (async () => { await Promise.all([loadTables(), loadQueue()]); })();
}();
</script>
</body>
</html>
